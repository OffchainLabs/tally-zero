name: Fetch Election Candidates

on:
  schedule:
    - cron: "0 */6 * * *" # Every 6 hours
  workflow_dispatch:
    inputs:
      election:
        description: "Election index (blank = latest active)"
        required: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Fetch candidates
        env:
          ARBITRUM_RPC_URL: ${{ vars.ARBITRUM_RPC_URL || 'https://arb1.arbitrum.io/rpc' }}
        run: |
          if [ -n "${{ inputs.election }}" ]; then
            npx tsx scripts/fetch-candidates.ts --election ${{ inputs.election }}
          else
            npx tsx scripts/fetch-candidates.ts
          fi

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/candidates.json
          git diff --cached --quiet || git commit -m "data: update candidate profiles"
          git push
